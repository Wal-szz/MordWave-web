<footer class="footer" role="contentinfo">
  <div class="section-container">

    <div class="footer__top">

      <!-- Brand -->
      <div class="footer__brand">
        <a href="#hero" class="footer__logo" aria-label="Mordwave - ir al inicio">
          <svg width="36" height="36" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="footer-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#7C5CE8"/>
              </linearGradient>
            </defs>
            <path d="M4 28 L10 10 L18 22 L26 10 L34 28" stroke="url(#footer-grad)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="34" cy="28" r="4" fill="#5B3FD4"/>
          </svg>
          <span class="footer__logo-text">Mordwave</span>
        </a>
        <p class="footer__tagline">
          Diseño y desarrollo web para negocios que quieren crecer en digital.
        </p>
        <a href="mailto:mordwave@gmail.com" class="footer__email">
          mordwave&#64;gmail.com
        </a>
      </div>

      <!-- Nav -->
      <nav class="footer__nav" aria-label="Navegación del footer">
        <p class="footer__nav-heading">Navegación</p>
        <ul role="list">
          @for (link of navLinks; track link.href) {
            <li>
              <a [href]="link.href" class="footer__nav-link">{{ link.label }}</a>
            </li>
          }
        </ul>
      </nav>

      <!-- Social -->
      <div class="footer__social-col">
        <p class="footer__nav-heading">Redes</p>
        <ul class="footer__social-list" role="list">
          <li>
            <a href="https://instagram.com/mordwaves" target="_blank" rel="noopener noreferrer"
               class="footer__social-link" aria-label="Instagram de Mordwave">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                <circle cx="12" cy="12" r="4"/>
                <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
              </svg>
              &#64;mordwaves
            </a>
          </li>
        </ul>
      </div>

    </div>

    <div class="footer__bottom">
      <p class="footer__copy">
        © {{ year() }} Mordwave. Todos los derechos reservados.
      </p>
      <p class="footer__made">
        Hecho con <span aria-label="amor">♥</span> en Chillán, Chile.
      </p>
    </div>

  </div>
</footer>
